<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="The S Tier Move: Dual Persona Simulator">
    <title>The S Tier Move: Dual Persona Simulator</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="vtuber-interface-container" aria-label="The S Tier Move: Dual Persona Simulator">
      <section class="hud-overlay" aria-label="Simulation metrics">
        <div class="hud-block">
          <span class="hud-label">XP</span>
          <span class="hud-value" id="xp-value">0</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">SC</span>
          <span class="hud-value" id="sc-value">0</span>
        </div>
        <div class="hud-block hud-stability">
          <label class="hud-label" for="stability-meter">Psychological Stability</label>
          <progress id="stability-meter" class="stability-meter" value="82" max="100">82</progress>
        </div>
      </section>

      <section class="simulator-stage" aria-label="Character simulation stage">
        <div class="character-viewport state-analytical" aria-label="2.5D character rig">
          <img class="layer-bg rig-layer" src="./layers/baground.png" alt="">
          <img class="layer-left-hair-back rig-layer tracking-layer" src="./layers/left hair back.png" alt="">
          <img class="layer-right-hair-back rig-layer tracking-layer" src="./layers/right hair back.png" alt="">
          <img class="layer-body rig-layer tracking-layer breathing-layer" src="./layers/base.png" alt="">
          <img class="layer-face-base rig-layer tracking-layer breathing-layer" src="./layers/faceless.png" alt="">
          <img class="layer-mouth rig-layer tracking-layer breathing-layer" src="./layers/mouth.png" alt="">
          <img class="layer-left-eye rig-layer tracking-layer breathing-layer" src="./layers/left eye.png" alt="">
          <img class="layer-right-eye rig-layer tracking-layer breathing-layer" src="./layers/right eye.png" alt="">
          <img class="layer-left-strand rig-layer tracking-layer" src="./layers/left strand hair.png" alt="">
          <img class="layer-right-strand rig-layer tracking-layer" src="./layers/right strand hair.png" alt="">
          <img class="layer-bangs rig-layer tracking-layer" src="./layers/bang.png" alt="Dual persona character rig">

          <button class="hitbox hitbox-head" type="button" aria-label="Head interaction"></button>
          <button class="hitbox hitbox-chest" type="button" aria-label="Chest interaction"></button>
        </div>
      </section>

      <section class="control-deck" aria-label="Dialogue and scan controls">
        <article class="dialogue-terminal" aria-label="Dialogue terminal">
          <div class="terminal-text">
            <p class="terminal-label">Dialogue</p>
            <div class="character-dialogue" aria-live="polite">
              Initialize the scenario. Define the move, the cost, and the probability of failure.
            </div>
            <p class="terminal-label">Internal State</p>
            <div class="internal-thinking-state" aria-live="polite">
              Analytical baseline active. Awaiting interaction vector.
            </div>
            <form class="chat-input-form" aria-label="Manual dialogue input">
              <input id="chat-text-input" class="chat-text-input" type="text" autocomplete="off" placeholder="Enter execution vector">
              <button class="chat-submit" type="submit">Send</button>
              <button id="mic-toggle-btn" class="mic-toggle-btn" type="button" aria-pressed="false" aria-label="Toggle microphone input">Mic</button>
            </form>
          </div>
          <div class="quiz-container" aria-label="Dialogue options">
            <p class="quiz-question">Select a strategic opening.</p>
            <div class="quiz-options">
              <button class="quiz-option" type="button" data-option="Run a cold assessment">Run a cold assessment</button>
              <button class="quiz-option" type="button" data-option="Force an S tier move">Force an S tier move</button>
              <button class="quiz-option" type="button" data-option="Audit emotional leakage">Audit emotional leakage</button>
            </div>
          </div>
        </article>

        <aside class="scan-upload-panel" aria-label="Academic scan upload">
          <label class="scan-label" for="gemini-api-key-input">Free Gemini Browser Mode</label>
          <input class="scan-file-input" id="gemini-api-key-input" type="password" autocomplete="off" placeholder="Paste Gemini API key for this browser">
          <button class="scan-submit" id="save-api-key-btn" type="button">Save Key</button>
          <p class="scan-status api-key-status" aria-live="polite">No browser key saved. Offline mode is active.</p>
          <label class="scan-label" for="scan-file">Academic Scanner</label>
          <input class="scan-file-input" id="scan-file" name="document" type="file" accept=".pdf,.txt,.md,.doc,.docx,.png,.jpg,.jpeg">
          <button class="scan-submit" type="button">Scan Document</button>
          <p class="scan-status" aria-live="polite">No document queued.</p>
        </aside>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
