<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character HUD System</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app-root-viewport">
    <!-- STICKY HEADER NAVIGATION BAR -->
    <header id="app-header-bar">
        <button id="hamburger-menu-trigger" class="hud-icon-btn">☰</button>
        <div class="header-branding">
            <h1>Character HUD</h1>
        </div>
    </header>

    <!-- ABSOLUTE COLLAPSIBLE NAVIGATION DRAWER -->
    <aside id="app-sidebar-drawer">
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item"><button class="nav-link" data-route="ch-core">CH Core</button></li>
                <li class="nav-item"><button class="nav-link" data-route="goal-tracker">Goal Tracker</button></li>
                <li class="nav-item"><button class="nav-link" data-route="calendar">Calendar</button></li>
                <li class="nav-item"><button class="nav-link" data-route="distraction">Distraction Tracker</button></li>
                <li class="nav-item"><button class="nav-link" data-route="profile">User Profile Context</button></li>
            </ul>
        </nav>
    </aside>

    <!-- MAIN CONTENT VIEWPORT -->
    <main class="app-main-content">
        <!-- PANEL: CHARACTER AI -->
        <section id="panel-character-ai" class="content-panel active-panel">
            <div id="character-avatar-stage">
                <img id="avatar-sprite-layer" src="./exp3-proud or satisfied/idle.png" alt="Aoi Hinami">
            </div>
            <div class="chat-container">
                <div id="chat-history-log" class="chat-history-viewport">
                    <div class="chat-message system-message">
                        <p>Welcome to Character HUD. Type a message to start.</p>
                    </div>
                </div>
                <div id="chat-input-dock" class="chat-input-dock">
                    <input 
                        id="chat-user-input" 
                        type="text" 
                        placeholder="Message..." 
                        class="chat-input-field"
                    >
                    <button id="chat-mic-btn" class="chat-action-btn">🎙️</button>
                    <button id="chat-send-btn" class="chat-action-btn">➔</button>
                </div>
            </div>
        </section>

        <!-- PANEL: CALENDAR -->
        <section id="panel-calendar" class="content-panel">
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <button id="calendar-prev-month" class="calendar-nav-btn">◀</button>
                    <h3 id="calendar-month-year" class="calendar-month-display">May 2026</h3>
                    <button id="calendar-next-month" class="calendar-nav-btn">▶</button>
                </div>
                <div id="calendar-days-matrix" class="calendar-grid"></div>
            </div>
        </section>

        <!-- PANEL: GOAL TRACKER -->
        <section id="panel-goal-tracker" class="content-panel">
            <h2>Goal Tracker</h2>
            <p>Goal tracking panel content</p>
        </section>

        <!-- PANEL: DISTRACTION TRACKER -->
        <section id="panel-distraction" class="content-panel">
            <h2>Distraction Tracker</h2>
            <p>Distraction tracking panel content</p>
        </section>

        <!-- PANEL: USER PROFILE -->
        <section id="panel-profile" class="content-panel">
            <h2>User Profile Context</h2>
            <p>User profile panel content</p>
        </section>
    </main>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
</body>
</html>
